<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus Tech</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; padding: 40px 20px; }
  .logo { font-size: 48px; font-weight: 700; color: #1E88E5; letter-spacing: -1px; }
  .logo span { color: #e2e8f0; }
  .tagline { color: #94a3b8; margin-top: 12px; font-size: 16px; }
  .apps { margin-top: 48px; }
  .app-card { background: #1e293b; border: 1px solid #1e3a5a; border-radius: 16px; padding: 24px 32px; display: inline-block; margin: 8px; min-width: 200px; }
  .app-name { font-size: 18px; font-weight: 600; color: #e2e8f0; }
  .app-links { margin-top: 10px; display: flex; gap: 12px; justify-content: center; }
  .app-links a { color: #1E88E5; text-decoration: none; font-size: 13px; }
  .app-links a:hover { text-decoration: underline; }
  .footer { margin-top: 60px; color: #475569; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Oceanus<span>Tech</span></div>
  <div class="tagline">Building useful apps for everyday life</div>
  <div class="apps">
    <div class="app-card">
      <div class="app-name">TrackMySpend</div>
      <div class="app-links">
        <a href="/trackmyspend/privacy">Privacy Policy</a>
        <a href="/trackmyspend/terms">Terms of Service</a>
      </div>
    </div>
  </div>
  <div class="footer">© 2026 Oceanus Tech. All rights reserved.</div>
</div>
</body>
</html>
